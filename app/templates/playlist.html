{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Favorites Playlist</title>
  <link rel="stylesheet" href="{% static 'styles.css' %}">
  <style>
    body {
      background: linear-gradient(135deg, #181f3a 0%, #1e2a47 50%, #2b5876 100%);
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }
    .navbar {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.2rem 1.5rem;
      background: rgba(15, 18, 34, 0.82);
      border-radius: 22px;
      box-shadow: 0 8px 32px 0 rgba(0,0,0,0.28);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      margin: 1.5rem 1.25rem 1rem 1.25rem;
      position: sticky;
      top: 0;
      z-index: 100;
      border: 1.5px solid rgba(0,255,224,0.13);
      transition: background 0.3s, box-shadow 0.3s;
    }
    .navbar .navbar-links {
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 0.9rem;
      width: 100%;
      max-width: 760px;
    }
    .navbar h1 {
      flex: 1 1 220px;
      min-width: 150px;
    }
    .navbar h1 {
      font-size: 1.7rem;
      color: #00ffe0;
      display: flex;
      align-items: center;
      gap: 0.7rem;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .navbar .logo {
      width: 38px;
      height: 38px;
      display: inline-block;
      vertical-align: middle;
      margin-right: 0.3rem;
    }
    .navbar-links {
      display: flex;
      align-items: center;
      gap: 1.2rem;
    }
    .edit-btn {
      background: #23272f;
      color: #00ffe0;
      border-radius: 8px;
      padding: 0.3rem 0.8rem;
      text-decoration: none;
      font-size: 0.95rem;
      transition: all 0.3s ease;
      border: 1.5px solid rgba(0,255,224,0.3);
    }
    .edit-btn:hover {
      background: #00ffe0;
      color: #181818;
      box-shadow: 0 0 16px #00ffe088, 0 0 8px #00ffe044;
      transform: scale(1.05);
      border-color: #00ffe0;
    }
    .container {
      display: flex;
      gap: 2rem;
      margin: 3rem auto;
      width: 90vw;
      max-width: 1200px;
      align-items: flex-start;
      justify-content: center;
    }
    .card {
      background: rgba(30, 30, 30, 0.38);
      border-radius: 18px;
      box-shadow: 0 8px 32px 0 rgba(0,0,0,0.25);
      border: 1.5px solid rgba(0,255,224,0.18);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 2rem 1.5rem;
      min-width: 320px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }
    .card h2 {
      color: #00ffe0;
      margin-bottom: 1rem;
      font-size: 1.3rem;
      letter-spacing: 1px;
      text-align: center;
    }
    @media (max-width: 1024px) {
      .container {
        gap: 1.5rem;
        width: 95vw;
      }
    }
    @media (max-width: 768px) {
      * {
        font-size: 15px;
      }
      .navbar {
        padding: 0.8rem 1rem;
        margin: 0.8rem 0.5rem 1rem 0.5rem;
        border-radius: 16px;
        flex-wrap: wrap;
        gap: 1rem;
      }
      .navbar h1 {
        font-size: 1.3rem;
        flex: 1 1 auto;
        min-width: 150px;
      }
      .navbar .logo {
        width: 30px;
        height: 30px;
      }
      .navbar-links {
        width: 100%;
        gap: 0.8rem;
        flex-wrap: wrap;
      }
      .edit-btn {
        flex: 1 1 auto;
        padding: 0.4rem 0.8rem;
        font-size: 0.9rem;
        text-align: center;
        min-height: 36px;
      }
      .edit-btn form {
        width: 100%;
      }
      .container {
        flex-direction: column;
        gap: 1rem;
        margin: 1.5rem auto;
        width: 95vw;
      }
      .card {
        padding: 1.5rem 1rem;
        min-width: 0;
        flex: 1 1 100%;
      }
      .card h2 {
        font-size: 1.1rem;
        margin-bottom: 0.8rem;
      }
      .playlist-list {
        gap: 0.8rem;
      }
      .playlist-item {
        padding: 0.6rem 0.8rem;
        flex-direction: column;
        align-items: flex-start;
        gap: 0.5rem;
      }
      .playlist-item img {
        width: 40px !important;
        height: 40px !important;
      }
      .song-title {
        font-size: 0.95rem;
      }
      .heart {
        font-size: 1.3rem;
      }
    }
    @media (max-width: 480px) {
      * {
        font-size: 14px;
      }
      .navbar {
        padding: 0.6rem 0.8rem;
        margin: 0.5rem 0.3rem 0.8rem 0.3rem;
        gap: 0.6rem;
      }
      .navbar h1 {
        font-size: 1.05rem;
      }
      .navbar .logo {
        width: 26px;
        height: 26px;
      }
      .navbar-links {
        gap: 0.4rem;
      }
      .edit-btn {
        padding: 0.35rem 0.6rem;
        font-size: 0.8rem;
        flex: 0 1 auto;
      }
      .container {
        margin: 1rem auto;
        width: 98vw;
        gap: 0.8rem;
      }
      .card {
        padding: 1rem 0.8rem;
      }
      .card h2 {
        font-size: 1rem;
        margin-bottom: 0.6rem;
      }
      .playlist-list {
        gap: 0.6rem;
      }
      .playlist-item {
        padding: 0.5rem 0.6rem;
        gap: 0.4rem;
      }
      .playlist-item img {
        width: 36px !important;
        height: 36px !important;
      }
      .song-title {
        font-size: 0.85rem;
      }
      .heart {
        font-size: 1.2rem;
      }
      #nowPlaying {
        font-size: 0.8rem;
      }
    }
    @media (max-width: 360px) {
      .navbar {
        padding: 0.5rem 0.5rem;
        gap: 0.4rem;
      }
      .navbar h1 {
        font-size: 0.95rem;
      }
      .navbar-links {
        gap: 0.3rem;
      }
      .edit-btn {
        padding: 0.3rem 0.5rem;
        font-size: 0.75rem;
      }
      .container {
        width: 100vw;
        margin: 0.8rem auto;
      }
      .card {
        padding: 0.8rem 0.6rem;
        border-radius: 14px;
      }
      .playlist-item {
        padding: 0.4rem 0.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="navbar">
    <h1>
      <span class="logo">
        <svg viewBox="0 0 32 32" fill="none" width="38" height="38">
          <circle cx="16" cy="16" r="16" fill="#00ffe0" fill-opacity="0.13"/>
          <path d="M22 7v12.5a3.5 3.5 0 1 1-2-3.15V11h-6v8.5a3.5 3.5 0 1 1-2-3.15V9a2 2 0 0 1 2-2h8z" fill="#00ffe0"/>
        </svg>
      </span>
      WeVibe
    </h1>
    <div class="navbar-links">
      <a href="{% url 'home' %}" class="edit-btn">Home</a>
      <form method="POST" action="{% url 'logout' %}" style="display:inline;">
        {% csrf_token %}
        <button type="submit" class="edit-btn" style="background:#ff3366;color:#fff;border:none;cursor:pointer;">Logout</button>
      </form>
    </div>
  </div>
  <div class="container">
    <div class="card">
      <h2>Playlist removed</h2>
      <p style="color:#aaa; text-align:center;">The playlist section has been removed to simplify the page.</p>
    </div>
  </div>
</body>
</html>
